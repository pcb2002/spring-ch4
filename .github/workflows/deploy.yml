name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # main 브랜치에 푸시될 때 실행

jobs:
  # --- 1. 빌드 및 도커 허브로 푸시 ---
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: JDK 17 세팅
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 빌드 (테스트 제외)
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      - name: Docker Hub 로그인
        uses: docker/login-action@v2
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker 이미지 빌드 및 푸시
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ${{ vars.DOCKER_USERNAME }}/spring-ch4:latest

  # --- 2. EC2에 접속해서 배포 ---
  deploy:
    needs: build # build 작업이 끝나면 실행
    runs-on: ubuntu-latest
    steps:
      - name: EC2에 SSH 접속 및 도커 실행
        uses: appleboy/ssh-action@master
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull ${{ vars.DOCKER_USERNAME }}/spring-ch4:latest
            sudo docker stop my-app || true
            sudo docker rm my-app || true
            sudo docker run -d -p 8080:8080 --name my-app ${{ vars.DOCKER_USERNAME }}/spring-ch4:latest